openapi: 3.0.3
info:
  title: Trading Dashboard API
  version: 1.0.0
  description: |
    Contract for the Benji trader assistant API. Endpoints expose quote intelligence,
    portfolio holdings, and personal finance insights consumed by the dashboard UI.
security:
  - ApiKeyAuth: []
paths:
  /api/quotes:
    get:
      tags:
        - Quotes
      operationId: getQuotesIndex
      summary: Describe the quote service entry point.
      responses:
        '200':
          description: Quote service metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotesIndex'
  /api/quotes/{symbol}:
    get:
      tags:
        - Quotes
      operationId: getQuote
      summary: Retrieve the latest quote for a ticker symbol.
      parameters:
        - name: symbol
          in: path
          required: true
          description: Equity or ETF ticker symbol (case insensitive).
          schema:
            type: string
            minLength: 1
            maxLength: 12
      responses:
        '200':
          description: Quote payload for the requested symbol.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuoteResponse'
        '400':
          description: Invalid ticker was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No quote could be located for the symbol.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/quotes/{symbol}/overview:
    get:
      tags:
        - Quotes
      operationId: getQuoteOverview
      summary: Retrieve company fundamentals for a ticker symbol.
      parameters:
        - name: symbol
          in: path
          required: true
          description: Equity or ETF ticker symbol (case insensitive).
          schema:
            type: string
            minLength: 1
            maxLength: 12
      responses:
        '200':
          description: Company overview payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyOverviewResponse'
        '400':
          description: Invalid ticker was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No overview could be located for the symbol.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/quotes/{symbol}/history:
    get:
      tags:
        - Quotes
      operationId: getQuoteHistory
      summary: Retrieve daily price history for a ticker symbol.
      parameters:
        - name: symbol
          in: path
          required: true
          description: Equity or ETF ticker symbol (case insensitive).
          schema:
            type: string
            minLength: 1
            maxLength: 12
      responses:
        '200':
          description: Daily price history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceHistoryResponse'
        '400':
          description: Invalid ticker was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No history could be located for the symbol.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/quotes/{symbol}/news:
    get:
      tags:
        - Quotes
      operationId: getQuoteNews
      summary: Retrieve recent company news for a ticker symbol.
      parameters:
        - name: symbol
          in: path
          required: true
          description: Equity or ETF ticker symbol (case insensitive).
          schema:
            type: string
            minLength: 1
            maxLength: 12
      responses:
        '200':
          description: Recent news articles for the symbol.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsResponse'
        '204':
          description: No news available for the symbol.
        '400':
          description: Invalid ticker was provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/portfolio/positions:
    get:
      tags:
        - Portfolio
      operationId: listPortfolioPositions
      summary: List normalized portfolio positions and cost basis.
      responses:
        '200':
          description: Portfolio positions currently stored.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioPositionsResponse'
        '204':
          description: No portfolio positions available.
    post:
      tags:
        - Portfolio
      operationId: addPortfolioPosition
      summary: Set a position by ticker, replacing any existing holding with the supplied quantity and average price.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPositionRequest'
      responses:
        '201':
          description: Position created or updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioPosition'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/portfolio/positions/{ticker}:
    delete:
      tags:
        - Portfolio
      operationId: deletePortfolioPosition
      summary: Remove a position entirely from the portfolio.
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Position deleted.
        '404':
          description: Position not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/portfolio/summary:
    get:
      tags:
        - Portfolio
      operationId: getPortfolioSummary
      summary: Provide aggregate portfolio metrics derived from stored positions.
      responses:
        '200':
          description: Portfolio summary view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioSummary'
        '204':
          description: No portfolio data is available to summarize.
  /api/finance/summary:
    get:
      tags:
        - Finance
      operationId: getFinanceSummary
      summary: Provide high-level spend analytics for the current month.
      responses:
        '200':
          description: Finance snapshot derived from recent transactions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceSummary'
        '204':
          description: No finance data is available.
  /api/finance/transactions:
    get:
      tags:
        - Finance
      operationId: listFinanceTransactions
      summary: List categorized personal finance transactions.
      parameters:
        - name: limit
          in: query
          required: false
          description: Maximum number of most recent transactions to return (default 100, max 500).
          schema:
            type: integer
            minimum: 1
            maximum: 500
        - name: category
          in: query
          required: false
          description: Filter transactions by normalized category slug (e.g., housing, dining).
          schema:
            type: string
      responses:
        '200':
          description: Finance transactions matching the criteria.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FinanceTransactionsResponse'
        '204':
          description: No transactions matched the query.
  /api/journal/entries:
    get:
      tags:
        - Journal
      operationId: listJournalEntries
      summary: List journal entries, newest first.
      parameters:
        - name: ticker
          in: query
          required: false
          schema:
            type: string
        - name: tag
          in: query
          required: false
          schema:
            type: string
        - name: entryDate
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of journal entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JournalEntryResponse'
    post:
      tags:
        - Journal
      operationId: createJournalEntry
      summary: Create a new journal entry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryRequest'
      responses:
        '201':
          description: Entry created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryResponse'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/journal/entries/{id}:
    put:
      tags:
        - Journal
      operationId: updateJournalEntry
      summary: Update an existing journal entry body.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalEntryRequest'
      responses:
        '200':
          description: Entry updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalEntryResponse'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Journal
      operationId: deleteJournalEntry
      summary: Delete a journal entry.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Entry deleted.
        '404':
          description: Entry not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/journal/goals:
    get:
      tags:
        - Journal
      operationId: listJournalGoals
      summary: List all journal goals with computed progress.
      responses:
        '200':
          description: List of goals.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JournalGoalResponse'
    post:
      tags:
        - Journal
      operationId: createJournalGoal
      summary: Create a new journal goal.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalGoalRequest'
      responses:
        '201':
          description: Goal created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalGoalResponse'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/journal/goals/{id}:
    put:
      tags:
        - Journal
      operationId: updateJournalGoal
      summary: Update an existing journal goal.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JournalGoalRequest'
      responses:
        '200':
          description: Goal updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalGoalResponse'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Goal not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Journal
      operationId: deleteJournalGoal
      summary: Delete a journal goal.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Goal deleted.
        '404':
          description: Goal not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/journal/stats:
    get:
      tags:
        - Journal
      operationId: getJournalStats
      summary: Return journal statistics including streak, calendar, and most-mentioned tokens.
      responses:
        '200':
          description: Journal statistics.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalStatsResponse'

  /api/trades:
    get:
      tags:
        - Trades
      operationId: listTrades
      summary: List all trades with optional filters.
      parameters:
        - name: ticker
          in: query
          required: false
          schema:
            type: string
        - name: side
          in: query
          required: false
          schema:
            type: string
            enum: [BUY, SELL, EXPIRE, EXERCISE]
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of trades.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeListResponse'
    post:
      tags:
        - Trades
      operationId: logTrade
      summary: Log a new trade.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogTradeRequest'
      responses:
        '201':
          description: Trade logged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trade'
        '400':
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/trades/{id}:
    get:
      tags:
        - Trades
      operationId: getTrade
      summary: Get a single trade by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Trade details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Trade'
        '404':
          description: Trade not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Trades
      operationId: deleteTrade
      summary: Delete a trade.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Trade deleted.
        '404':
          description: Trade not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/trades/stats:
    get:
      tags:
        - Trades
      operationId: getTradeStats
      summary: Aggregated trade performance stats.
      responses:
        '200':
          description: Trade stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeStats'

  /api/trades/closed:
    get:
      tags:
        - Trades
      operationId: listClosedTrades
      summary: FIFO-matched closed trades with P&L.
      responses:
        '200':
          description: Closed trades.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClosedTradeListResponse'

  /api/trades/pnl-history:
    get:
      tags:
        - Trades
      operationId: getPnlHistory
      summary: Cumulative P&L over time.
      responses:
        '200':
          description: P&L history.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PnlHistoryResponse'

  /api/trades/calendar:
    get:
      tags:
        - Trades
      operationId: getTradeCalendar
      summary: Daily P&L by date for calendar heatmap.
      responses:
        '200':
          description: Trade calendar.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TradeCalendarResponse'

  /api/demo/session:
    post:
      operationId: startDemoSession
      summary: Start a demo session
      description: Resets and seeds demo data, returns the demo API key. No auth required.
      security: []
      tags:
        - Demo
      responses:
        '200':
          description: Demo session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoSessionResponse'

  /api/admin/users:
    post:
      operationId: createUser
      summary: Create a new user (admin only)
      tags:
        - Admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserResponse'
        '403':
          description: Requesting user is not admin

components:
  schemas:
    QuotesIndex:
      type: object
      required:
        - message
        - endpoints
      properties:
        message:
          type: string
          example: Quote service ready.
        endpoints:
          type: array
          minItems: 1
          description: Helpful endpoints exposed by the quote service.
          items:
            type: string
            example: /api/quotes/{symbol}
    QuoteResponse:
      type: object
      required:
        - symbol
        - price
        - as_of
      properties:
        symbol:
          type: string
          description: Requested ticker symbol.
          example: AAPL
        price:
          type: number
          format: double
          description: Last traded price reported by the primary provider.
          example: 193.63
        currency:
          type: string
          description: ISO 4217 currency code for the quote.
          example: USD
        change_pct:
          type: number
          format: double
          description: Percentage change from the previous close.
          example: 1.25
        as_of:
          type: string
          format: date-time
          description: Timestamp the quote was last refreshed.
          example: '2024-07-19T15:30:00Z'
        source:
          type: string
          description: Market data provider that supplied the quote.
          example: Yahoo Finance
    PortfolioPositionsResponse:
      type: object
      required:
        - positions
      properties:
        as_of:
          type: string
          format: date-time
          description: Snapshot timestamp when the positions were generated.
        positions:
          type: array
          description: Portfolio positions persisted by the ingestion pipeline.
          items:
            $ref: '#/components/schemas/PortfolioPosition'
    AddPositionRequest:
      type: object
      required:
        - ticker
        - quantity
        - price_per_share
      properties:
        ticker:
          type: string
          description: Ticker symbol to add shares for.
          example: AAPL
        quantity:
          type: number
          format: double
          description: Number of shares to add.
          minimum: 0.000001
          example: 10.5
        price_per_share:
          type: number
          format: double
          description: Average cost per share; total cost basis is set to quantity × price_per_share.
          minimum: 0.000001
          example: 163.42
    PortfolioPosition:
      type: object
      required:
        - ticker
        - quantity
        - cost_basis
      properties:
        ticker:
          type: string
          description: Normalized ticker symbol.
          example: VOO
        quantity:
          type: number
          format: double
          description: Total shares held for the ticker.
          example: 12.5
        cost_basis:
          type: number
          format: double
          description: Aggregate cost basis for the position.
          example: 4500.12
    PortfolioSummary:
      type: object
      required:
        - positions_count
        - total_quantity
        - total_cost_basis
      properties:
        positions_count:
          type: integer
          format: int32
          description: Number of unique tickers in the portfolio.
          example: 8
        total_quantity:
          type: number
          format: double
          description: Sum of share quantities across all positions.
          example: 154.72
        total_cost_basis:
          type: number
          format: double
          description: Total invested cost basis across the portfolio.
          example: 25340.55
        as_of:
          type: string
          format: date-time
          description: Timestamp when the summary metrics were calculated.
    FinanceSummary:
      type: object
      required:
        - month_to_date_spend
        - average_daily_spend
        - projected_month_end_spend
        - as_of
      properties:
        month_to_date_spend:
          type: number
          format: double
          description: Total spend recorded for the current calendar month.
          example: 2845.22
        average_daily_spend:
          type: number
          format: double
          description: Average daily spend computed for the active month.
          example: 142.26
        projected_month_end_spend:
          type: number
          format: double
          description: Forecasted spend by the end of the month.
          example: 4400.0
        as_of:
          type: string
          format: date-time
          description: Timestamp when analytics were calculated.
    FinanceTransactionsResponse:
      type: object
      required:
        - transactions
      properties:
        as_of:
          type: string
          format: date-time
          description: Snapshot timestamp for the transaction list.
        transactions:
          type: array
          items:
            $ref: '#/components/schemas/FinanceTransaction'
          description: Transactions ordered from newest to oldest.
    FinanceTransaction:
      type: object
      required:
        - id
        - posted_at
        - description
        - amount
        - category
      properties:
        id:
          type: string
          description: Unique identifier for the transaction.
          example: txn_20240719_001
        posted_at:
          type: string
          format: date-time
          description: Timestamp the transaction posted.
          example: '2024-07-18T12:00:00Z'
        description:
          type: string
          description: Human readable description.
          example: Whole Foods Market
        amount:
          type: number
          format: double
          description: Signed transaction amount; debits are negative.
          example: -72.34
        category:
          type: string
          description: Normalized category slug.
          example: groceries
        notes:
          type: string
          description: Optional annotations captured by the user.
    CompanyOverviewResponse:
      type: object
      required:
        - symbol
      properties:
        symbol:
          type: string
          description: Requested ticker symbol.
          example: AAPL
        name:
          type: string
          description: Company name.
          example: Apple Inc
        sector:
          type: string
          description: Market sector.
          example: Technology
        industry:
          type: string
          description: Industry classification.
          example: Consumer Electronics
        market_cap:
          type: number
          format: double
          description: Market capitalization in USD.
          example: 3000000000000
        pe_ratio:
          type: number
          format: double
          description: Price-to-earnings ratio.
          example: 25.4
        eps:
          type: number
          format: double
          description: Earnings per share.
          example: 6.5
        dividend_yield:
          type: number
          format: double
          description: Annual dividend yield as a decimal.
          example: 0.0055
        beta:
          type: number
          format: double
          description: Beta coefficient.
          example: 1.18
        fifty_two_week_high:
          type: number
          format: double
          description: 52-week high price.
          example: 199.62
        fifty_two_week_low:
          type: number
          format: double
          description: 52-week low price.
          example: 124.17
    PriceHistoryResponse:
      type: object
      required:
        - symbol
        - bars
      properties:
        symbol:
          type: string
          description: Requested ticker symbol.
          example: AAPL
        bars:
          type: array
          description: Daily OHLCV bars sorted oldest to newest.
          items:
            $ref: '#/components/schemas/DailyBarDto'
    DailyBarDto:
      type: object
      required:
        - date
        - open
        - high
        - low
        - close
        - volume
      properties:
        date:
          type: string
          format: date
          description: Trading date.
          example: '2024-07-19'
        open:
          type: number
          format: double
          example: 190.0
        high:
          type: number
          format: double
          example: 195.5
        low:
          type: number
          format: double
          example: 189.2
        close:
          type: number
          format: double
          example: 193.63
        volume:
          type: integer
          format: int64
          example: 45000000
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine readable error code.
          example: SYMBOL_INVALID
        message:
          type: string
          description: Explanation of the error condition.
          example: Provided ticker symbol is invalid.
        details:
          type: array
          description: Additional detail strings.
          items:
            type: string
    NewsResponse:
      type: object
      required:
        - symbol
        - articles
      properties:
        symbol:
          type: string
          description: Requested ticker symbol.
          example: AAPL
        articles:
          type: array
          description: Recent news articles ordered newest first.
          items:
            $ref: '#/components/schemas/NewsArticle'
    NewsArticle:
      type: object
      required:
        - id
        - headline
        - source
        - url
        - published_at
      properties:
        id:
          type: integer
          format: int64
          description: Unique article identifier.
        headline:
          type: string
          description: Article headline.
          example: Apple reports record quarterly earnings
        summary:
          type: string
          description: Brief article summary.
        source:
          type: string
          description: News source name.
          example: Reuters
        url:
          type: string
          description: Link to the full article.
        image:
          type: string
          description: Thumbnail image URL.
        published_at:
          type: string
          format: date-time
          description: Publication timestamp.
    JournalEntryRequest:
      type: object
      required:
        - body
        - entry_date
      properties:
        body:
          type: string
          description: HTML content of the journal entry.
          example: '<p>$NVDA holding strong today. #macro</p>'
        entry_date:
          type: string
          format: date
          description: Server-local date for this entry (YYYY-MM-DD).
          example: '2026-03-17'
    JournalEntryResponse:
      type: object
      required:
        - id
        - body
        - entry_date
        - tickers
        - tags
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        body:
          type: string
        entry_date:
          type: string
          format: date
        tickers:
          type: array
          items:
            type: string
          example: ['NVDA', 'MSFT']
        tags:
          type: array
          items:
            type: string
          example: ['macro', 'growth']
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    JournalGoalRequest:
      type: object
      required:
        - label
        - goal_type
      properties:
        label:
          type: string
          example: 'Hit $500K'
        goal_type:
          type: string
          enum: [milestone, habit]
        target_value:
          type: number
          format: double
          nullable: true
        milestone_value:
          type: number
          format: double
          nullable: true
        deadline:
          type: string
          format: date
          nullable: true
    JournalGoalResponse:
      type: object
      required:
        - id
        - label
        - goal_type
        - created_at
      properties:
        id:
          type: integer
          format: int64
        label:
          type: string
        goal_type:
          type: string
          enum: [milestone, habit]
        target_value:
          type: number
          format: double
          nullable: true
        current_progress:
          type: number
          format: double
          nullable: true
        progress_pct:
          type: number
          format: double
          nullable: true
        deadline:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
    JournalStatsResponse:
      type: object
      required:
        - entry_count
        - current_streak
        - calendar
        - most_mentioned
      properties:
        entry_count:
          type: integer
          format: int64
        current_streak:
          type: integer
        calendar:
          type: object
          description: Map of ISO date string to activity level (0=none, 1=entry, 2=rich entry).
          additionalProperties:
            type: integer
          example:
            '2026-03-01': 0
            '2026-03-15': 1
            '2026-03-17': 2
        most_mentioned:
          type: array
          items:
            $ref: '#/components/schemas/JournalTokenCount'
    JournalTokenCount:
      type: object
      required:
        - token
        - count
      properties:
        token:
          type: string
          example: '$NVDA'
        count:
          type: integer

