name: ci
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api/trader-assistant/trading-dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: ./gradlew spotlessCheck build --no-daemon

      - name: Upload JAR artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: benji-jar
          path: |
            apps/api/trader-assistant/trading-dashboard/build/libs/trading-dashboard-*.jar
            !apps/api/trader-assistant/trading-dashboard/build/libs/*-plain.jar
          retention-days: 1

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: api-reports
          if-no-files-found: warn
          path: |
            apps/api/trader-assistant/trading-dashboard/build/reports/tests/test/**
            apps/api/trader-assistant/trading-dashboard/build/reports/spotless/**

  deploy:
    needs: api
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v8
        with:
          name: benji-jar
          path: dist

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" | base64 -d > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H 107.22.236.28 >> ~/.ssh/known_hosts

      - name: Deploy JAR to Lightsail
        run: |
          JAR=$(find dist -name "*.jar" ! -name "*-plain.jar" | head -1)
          ssh -i ~/.ssh/deploy.pem ubuntu@107.22.236.28 \
            "cp /opt/benji/benji.jar /opt/benji/benji.jar.prev 2>/dev/null || true"
          rsync -az -e "ssh -i ~/.ssh/deploy.pem" "$JAR" ubuntu@107.22.236.28:/opt/benji/benji.jar

      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy.pem ubuntu@107.22.236.28 "sudo systemctl restart benji"

      - name: Verify health
        run: |
          for i in $(seq 1 20); do
            if curl --fail --silent https://port.adhdquants.com/actuator/health; then
              echo ""
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed, waiting 15s..."
            sleep 15
          done
          echo "Health check failed after 5 minutes — rolling back"
          ssh -i ~/.ssh/deploy.pem ubuntu@107.22.236.28 \
            "cp /opt/benji/benji.jar.prev /opt/benji/benji.jar && sudo systemctl restart benji"
          exit 1
