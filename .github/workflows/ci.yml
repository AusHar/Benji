name: ci
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api/trader-assistant/trading-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - run: ./gradlew spotlessCheck build --no-daemon

      - name: OWASP Dependency-Check
        run: ./gradlew dependencyCheckAnalyze
        continue-on-error: true

      - name: Upload JAR artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: benji-jar
          path: apps/api/trader-assistant/trading-dashboard/build/libs/trading-dashboard-*.jar
          retention-days: 1

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reports
          if-no-files-found: warn
          path: |
            apps/api/trader-assistant/trading-dashboard/build/reports/tests/test/**
            apps/api/trader-assistant/trading-dashboard/build/reports/dependency-check-report.html
            apps/api/trader-assistant/trading-dashboard/build/reports/spotless/**

  deploy:
    needs: api
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: benji-jar
          path: dist

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/deploy.pem
          chmod 600 ~/.ssh/deploy.pem
          ssh-keyscan -H 107.22.236.28 >> ~/.ssh/known_hosts

      - name: Deploy JAR to Lightsail
        run: |
          scp -i ~/.ssh/deploy.pem dist/trading-dashboard-*.jar ubuntu@107.22.236.28:/opt/benji/benji.jar

      - name: Restart service
        run: |
          ssh -i ~/.ssh/deploy.pem ubuntu@107.22.236.28 "sudo systemctl restart benji"

      - name: Verify health
        run: |
          sleep 20
          curl --fail --retry 5 --retry-delay 5 http://107.22.236.28/actuator/health
